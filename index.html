<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>verser29</title>
    <meta name="description" content="verser29 — creative hub by r29. all my website creations in one place.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0b1120, #0a0f1a);
            min-height: 100vh;
            color: #eef2ff;
            line-height: 1.5;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }

        .hero h1 {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff, #c084fc, #60a5fa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .hero .tagline {
            font-size: 1rem;
            color: #94a3b8;
            background: rgba(255,255,255,0.05);
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.6);
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .stat-card span {
            font-weight: 800;
            font-size: 1.2rem;
            color: #a78bfa;
            margin-right: 0.3rem;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2.5rem;
            background: rgba(15, 23, 42, 0.4);
            padding: 0.8rem 1.5rem;
            border-radius: 80px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        .search-box input:focus {
            border-color: #8b5cf6;
        }

        .search-box input::placeholder {
            color: #94a3b8;
        }

        .filters {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: rgba(139, 92, 246, 0.3);
        }

        .filter-btn.active {
            background: #8b5cf6;
            color: white;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.8rem;
        }

        .project-card {
            background: rgba(15, 23, 42, 0.7);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-6px);
            border-color: rgba(139, 92, 246, 0.5);
            background: rgba(20, 30, 55, 0.8);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .project-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .project-title h3 {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .project-category {
            font-size: 0.7rem;
            text-transform: uppercase;
            background: rgba(139, 92, 246, 0.3);
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            color: #c4b5fd;
        }

        .project-description {
            margin: 1rem 0 1.2rem;
            font-size: 0.9rem;
            color: #cbd5e1;
            line-height: 1.5;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .repo-link {
            font-size: 0.75rem;
            color: #94a3b8;
            text-decoration: none;
            font-family: monospace;
        }

        .repo-link:hover {
            color: #a78bfa;
        }

        .visit-btn {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .visit-btn:hover {
            transform: scale(1.02);
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            background: rgba(0,0,0,0.3);
            border-radius: 2rem;
            grid-column: 1 / -1;
        }

        .footer {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            font-size: 0.75rem;
            color: #64748b;
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .hero h1 { font-size: 2.8rem; }
            .controls { flex-direction: column; border-radius: 1.5rem; }
            .projects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>verser29</h1>
        <div class="tagline">✦ creations by r29 ✦</div>
    </div>

    <div class="stats">
        <div class="stat-card"><span id="projectCount">0</span> projects</div>
        <div class="stat-card"><span id="categoryCount">0</span> categories</div>
    </div>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 search projects...">
        </div>
        <div class="filters" id="filterContainer">
            <button class="filter-btn active" data-category="all">all</button>
        </div>
    </div>

    <div class="projects-grid" id="projectsGrid">
        <div class="no-results">✨ loading your creations...</div>
    </div>

    <div class="footer">
        verser29 · every project is a website
    </div>
</div>

<script>
    let allProjects = [];
    let currentCategory = "all";
    let currentSearch = "";

    async function loadProjects() {
        try {
            const response = await fetch("websites.json");
            if (!response.ok) throw new Error("Failed to load websites.json");
            const data = await response.json();
            if (data.websites && Array.isArray(data.websites)) {
                allProjects = data.websites;
                renderFilters();
                renderProjects();
            } else {
                throw new Error("Invalid JSON structure");
            }
        } catch (err) {
            document.getElementById("projectsGrid").innerHTML = `<div class="no-results">⚠️ Could not load websites.json</div>`;
        }
    }

    function getUniqueCategories() {
        return [...new Set(allProjects.map(p => p.category))];
    }

    function renderFilters() {
        const categories = getUniqueCategories();
        const container = document.getElementById("filterContainer");
        let html = `<button class="filter-btn active" data-category="all">all</button>`;
        categories.forEach(cat => {
            html += `<button class="filter-btn" data-category="${cat}">${cat}</button>`;
        });
        container.innerHTML = html;

        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentCategory = btn.dataset.category;
                renderProjects();
            });
        });
    }

    function getFilteredProjects() {
        let filtered = [...allProjects];
        if (currentCategory !== "all") {
            filtered = filtered.filter(p => p.category === currentCategory);
        }
        if (currentSearch.trim() !== "") {
            const query = currentSearch.toLowerCase();
            filtered = filtered.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.description.toLowerCase().includes(query)
            );
        }
        return filtered;
    }

    function renderProjects() {
        const filtered = getFilteredProjects();
        const grid = document.getElementById("projectsGrid");

        document.getElementById("projectCount").innerText = filtered.length;
        document.getElementById("categoryCount").innerText = new Set(filtered.map(p => p.category)).size;

        if (filtered.length === 0) {
            grid.innerHTML = `<div class="no-results">✨ no matching projects found</div>`;
            return;
        }

        grid.innerHTML = filtered.map(project => {
            const firstLetter = project.name.charAt(0).toUpperCase();
            const repoName = project.url.includes("github.com") ? project.url.split("/").pop() : project.name;
            return `
                <div class="project-card">
                    <div class="card-header">
                        <div class="project-icon">${firstLetter}</div>
                        <div class="project-title">
                            <h3>${escapeHtml(project.name)}</h3>
                            <span class="project-category">✦ ${escapeHtml(project.category)}</span>
                        </div>
                    </div>
                    <div class="project-description">${escapeHtml(project.description)}</div>
                    <div class="card-footer">
                        <a href="${escapeHtml(project.url)}" class="repo-link" target="_blank" rel="noopener">📁 ${escapeHtml(repoName)}</a>
                        <a href="${escapeHtml(project.url)}" class="visit-btn" target="_blank" rel="noopener">visit site →</a>
                    </div>
                </div>
            `;
        }).join('');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById("searchInput").addEventListener("input", (e) => {
        currentSearch = e.target.value;
        renderProjects();
    });

    loadProjects();
</script>
</body>
</html>
